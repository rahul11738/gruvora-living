name: Reels Stress Suite

on:
  workflow_dispatch:
    inputs:
      reel_id:
        description: Reel ID to stress test
        required: true
        type: string
      rounds:
        description: Toggle rounds per user
        required: false
        default: "1"
        type: string
      workers:
        description: Concurrent workers
        required: false
        default: "40"
        type: string
      min_tokens:
        description: Minimum token count gate
        required: false
        default: "20"
        type: string
      min_success_rate:
        description: Minimum per-action success rate
        required: false
        default: "0.99"
        type: string
      max_error_rate:
        description: Maximum per-action error rate
        required: false
        default: "0.01"
        type: string
      max_elapsed_seconds:
        description: Maximum stress step duration in seconds (0 disables)
        required: false
        default: "120"
        type: string
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: read
  actions: read

jobs:
  # Stage 1: Fail-fast validation and config normalization.
  preflight:
    name: Validate Reels Stress Inputs
    runs-on: ubuntu-latest
    outputs:
      preflight_mode: ${{ steps.validate.outputs.preflight_mode }}
      preflight_reason: ${{ steps.validate.outputs.preflight_reason }}
      reel_id: ${{ steps.normalize.outputs.reel_id }}
      rounds: ${{ steps.normalize.outputs.rounds }}
      workers: ${{ steps.normalize.outputs.workers }}
      min_tokens: ${{ steps.normalize.outputs.min_tokens }}
      min_success_rate: ${{ steps.normalize.outputs.min_success_rate }}
      max_error_rate: ${{ steps.normalize.outputs.max_error_rate }}
      max_elapsed_seconds: ${{ steps.normalize.outputs.max_elapsed_seconds }}
      regression_max_success_drop_pp: ${{ steps.normalize.outputs.regression_max_success_drop_pp }}
      regression_max_error_increase_pp: ${{ steps.normalize.outputs.regression_max_error_increase_pp }}
    env:
      BASE_URL: ${{ secrets.REELS_BASE_URL }}
      USERS: ${{ secrets.REELS_STRESS_USERS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      RAW_REEL_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.reel_id || vars.REELS_NIGHTLY_REEL_ID }}
      RAW_ROUNDS: ${{ github.event_name == 'workflow_dispatch' && inputs.rounds || vars.REELS_NIGHTLY_ROUNDS }}
      RAW_WORKERS: ${{ github.event_name == 'workflow_dispatch' && inputs.workers || vars.REELS_NIGHTLY_WORKERS }}
      RAW_MIN_TOKENS: ${{ github.event_name == 'workflow_dispatch' && inputs.min_tokens || vars.REELS_NIGHTLY_MIN_TOKENS }}
      RAW_MIN_SUCCESS_RATE: ${{ github.event_name == 'workflow_dispatch' && inputs.min_success_rate || vars.REELS_NIGHTLY_MIN_SUCCESS_RATE }}
      RAW_MAX_ERROR_RATE: ${{ github.event_name == 'workflow_dispatch' && inputs.max_error_rate || vars.REELS_NIGHTLY_MAX_ERROR_RATE }}
      RAW_MAX_ELAPSED_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_elapsed_seconds || vars.REELS_NIGHTLY_MAX_ELAPSED_SECONDS }}
      RAW_REGRESSION_MAX_SUCCESS_DROP_PP: ${{ vars.REELS_REGRESSION_MAX_SUCCESS_DROP_PP }}
      RAW_REGRESSION_MAX_ERROR_INCREASE_PP: ${{ vars.REELS_REGRESSION_MAX_ERROR_INCREASE_PP }}
    steps:
      - name: Validate required secrets and identifiers
        id: validate
        shell: bash
        run: |
          missing=()

          [ -z "$BASE_URL" ] && missing+=("REELS_BASE_URL")
          [ -z "$USERS" ] && missing+=("REELS_STRESS_USERS")
          [ -z "$JWT_SECRET" ] && missing+=("JWT_SECRET")
          [ -z "$RAW_REEL_ID" ] && missing+=("REELS_NIGHTLY_REEL_ID or workflow input reel_id")

          if [ ${#missing[@]} -gt 0 ]; then
            reason=$(IFS=', '; echo "${missing[*]}")
            echo "preflight_mode=enforced-missing-secrets" >> "$GITHUB_OUTPUT"
            echo "preflight_reason=$reason" >> "$GITHUB_OUTPUT"
            echo "::error::Missing required configuration: $reason"
            exit 1
          fi

          echo "preflight_mode=enforced" >> "$GITHUB_OUTPUT"
          echo "preflight_reason=configured" >> "$GITHUB_OUTPUT"

      - name: Normalize numeric inputs and gate thresholds
        id: normalize
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          output_path = os.environ["GITHUB_OUTPUT"]

          def parse_number(name: str, raw: str, default: float, minimum: float = None, cast_int: bool = False):
              text = "" if raw is None else str(raw).strip()
              source = "input"
              if text == "":
                  text = str(default)
                  source = "default"
              try:
                  value = float(text)
              except ValueError:
                  raise SystemExit(f"::error::{name} must be numeric but got '{text}'")

              if minimum is not None and value < minimum:
                  raise SystemExit(f"::error::{name} must be >= {minimum}, got {value}")

              if cast_int:
                  value = int(value)
              return value, source

          reel_id = str(os.environ.get("RAW_REEL_ID", "")).strip()
          rounds, rounds_src = parse_number("ROUNDS", os.environ.get("RAW_ROUNDS"), 1, minimum=1, cast_int=True)
          workers, workers_src = parse_number("WORKERS", os.environ.get("RAW_WORKERS"), 40, minimum=1, cast_int=True)
          min_tokens, min_tokens_src = parse_number("MIN_TOKENS", os.environ.get("RAW_MIN_TOKENS"), 20, minimum=1, cast_int=True)
          min_success_rate, min_success_rate_src = parse_number("MIN_SUCCESS_RATE", os.environ.get("RAW_MIN_SUCCESS_RATE"), 0.99, minimum=0.0)
          max_error_rate, max_error_rate_src = parse_number("MAX_ERROR_RATE", os.environ.get("RAW_MAX_ERROR_RATE"), 0.01, minimum=0.0)
          max_elapsed_seconds, max_elapsed_seconds_src = parse_number("MAX_ELAPSED_SECONDS", os.environ.get("RAW_MAX_ELAPSED_SECONDS"), 120, minimum=0.0)
          regression_success_drop, regression_success_drop_src = parse_number(
              "REELS_REGRESSION_MAX_SUCCESS_DROP_PP",
              os.environ.get("RAW_REGRESSION_MAX_SUCCESS_DROP_PP"),
              0,
              minimum=0.0,
          )
          regression_error_increase, regression_error_increase_src = parse_number(
              "REELS_REGRESSION_MAX_ERROR_INCREASE_PP",
              os.environ.get("RAW_REGRESSION_MAX_ERROR_INCREASE_PP"),
              0,
              minimum=0.0,
          )

          debug_payload = {
              "event": "normalized_inputs",
              "reel_id_present": bool(reel_id),
              "rounds": {"value": rounds, "source": rounds_src},
              "workers": {"value": workers, "source": workers_src},
              "min_tokens": {"value": min_tokens, "source": min_tokens_src},
              "min_success_rate": {"value": min_success_rate, "source": min_success_rate_src},
              "max_error_rate": {"value": max_error_rate, "source": max_error_rate_src},
              "max_elapsed_seconds": {"value": max_elapsed_seconds, "source": max_elapsed_seconds_src},
              "regression_max_success_drop_pp": {"value": regression_success_drop, "source": regression_success_drop_src},
              "regression_max_error_increase_pp": {"value": regression_error_increase, "source": regression_error_increase_src},
          }
          print(json.dumps(debug_payload, sort_keys=True))

          with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"reel_id={reel_id}\n")
              out.write(f"rounds={rounds}\n")
              out.write(f"workers={workers}\n")
              out.write(f"min_tokens={min_tokens}\n")
              out.write(f"min_success_rate={min_success_rate}\n")
              out.write(f"max_error_rate={max_error_rate}\n")
              out.write(f"max_elapsed_seconds={max_elapsed_seconds}\n")
              out.write(f"regression_max_success_drop_pp={regression_success_drop}\n")
              out.write(f"regression_max_error_increase_pp={regression_error_increase}\n")
          PY

  # Stage 2: Execute tests only after preflight succeeds.
  reels-stress:
    name: Run Reels Stress Suite
    needs: preflight
    if: needs.preflight.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: reels-stress-suite
      cancel-in-progress: false
    defaults:
      run:
        working-directory: backend
    env:
      BASE_URL: ${{ secrets.REELS_BASE_URL }}
      USERS: ${{ secrets.REELS_STRESS_USERS }}
      WEBHOOK_URL: ${{ secrets.REELS_STRESS_WEBHOOK_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REEL_ID: ${{ needs.preflight.outputs.reel_id }}
      ROUNDS: ${{ needs.preflight.outputs.rounds }}
      WORKERS: ${{ needs.preflight.outputs.workers }}
      MIN_TOKENS: ${{ needs.preflight.outputs.min_tokens }}
      MIN_SUCCESS_RATE: ${{ needs.preflight.outputs.min_success_rate }}
      MAX_ERROR_RATE: ${{ needs.preflight.outputs.max_error_rate }}
      MAX_ELAPSED_SECONDS: ${{ needs.preflight.outputs.max_elapsed_seconds }}
      PREFLIGHT_MODE: ${{ needs.preflight.outputs.preflight_mode }}
      PREFLIGHT_REASON: ${{ needs.preflight.outputs.preflight_reason }}
      REGRESSION_MAX_SUCCESS_DROP_PP: ${{ needs.preflight.outputs.regression_max_success_drop_pp }}
      REGRESSION_MAX_ERROR_INCREASE_PP: ${{ needs.preflight.outputs.regression_max_error_increase_pp }}
      REPORT_DIR: ../test_reports

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            echo "Installing dependencies (attempt=$attempt)"
            if pip install -r requirements.txt; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Dependency installation failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 2))
          done

      - name: Log runtime configuration (sanitized)
        run: |
          python - <<'PY'
          import json
          import os

          payload = {
            "event": "runtime_configuration",
            "base_url_present": bool(os.environ.get("BASE_URL", "").strip()),
            "users_secret_present": bool(os.environ.get("USERS", "").strip()),
            "jwt_secret_present": bool(os.environ.get("JWT_SECRET", "").strip()),
            "reel_id": os.environ.get("REEL_ID", ""),
            "rounds": os.environ.get("ROUNDS", ""),
            "workers": os.environ.get("WORKERS", ""),
            "min_tokens": os.environ.get("MIN_TOKENS", ""),
            "min_success_rate": os.environ.get("MIN_SUCCESS_RATE", ""),
            "max_error_rate": os.environ.get("MAX_ERROR_RATE", ""),
            "max_elapsed_seconds": os.environ.get("MAX_ELAPSED_SECONDS", ""),
            "regression_max_success_drop_pp": os.environ.get("REGRESSION_MAX_SUCCESS_DROP_PP", ""),
            "regression_max_error_increase_pp": os.environ.get("REGRESSION_MAX_ERROR_INCREASE_PP", ""),
          }
          print(json.dumps(payload, sort_keys=True))
          PY

      - name: Run auth and security regression tests
        id: auth_security_tests
        continue-on-error: true
        run: python -m pytest tests/test_auth_security.py -q --junitxml=../test_reports/pytest_auth_security.xml
        env:
          REACT_APP_BACKEND_URL: ${{ env.BASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Run stress suite
        id: stress_suite
        if: always()
        run: python run_reels_stress_suite.py

      - name: Publish job summary
        if: always()
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import xml.etree.ElementTree as ET

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary_path:
            raise RuntimeError("GITHUB_STEP_SUMMARY is not available")

          preflight_mode = os.environ.get("PREFLIGHT_MODE", "unknown")
          preflight_reason = os.environ.get("PREFLIGHT_REASON", "not provided")
          auth_step_outcome = os.environ.get("AUTH_TESTS_OUTCOME", "unknown")
          stress_step_outcome = os.environ.get("STRESS_SUITE_OUTCOME", "unknown")
          baseline_fetch_outcome = os.environ.get("BASELINE_FETCH_OUTCOME", "unknown")
          baseline_fetch_status = os.environ.get("BASELINE_FETCH_STATUS", "unknown")

          auth_report_path = "../test_reports/pytest_auth_security.xml"
          auth_tests = 0
          auth_failures = 0
          auth_errors = 0
          auth_skipped = 0
          auth_passed = 0
          auth_status = "UNKNOWN"

          if os.path.exists(auth_report_path):
            try:
              root = ET.parse(auth_report_path).getroot()
              if root.tag == "testsuite":
                suite = root
              else:
                suite = root.find("testsuite")

              if suite is not None:
                auth_tests = int(suite.attrib.get("tests", 0))
                auth_failures = int(suite.attrib.get("failures", 0))
                auth_errors = int(suite.attrib.get("errors", 0))
                auth_skipped = int(suite.attrib.get("skipped", 0))
                auth_passed = max(auth_tests - auth_failures - auth_errors - auth_skipped, 0)
                auth_status = "PASS" if (auth_failures + auth_errors) == 0 else "FAIL"
            except Exception:
              auth_status = "PARSE_ERROR"

          report_paths = sorted(glob.glob("../test_reports/reels_stress_suite_*.json"))

          with open(summary_path, "a", encoding="utf-8") as out:
            out.write("## Pipeline Step Outcomes\n\n")
            out.write("| Step | Outcome |\n")
            out.write("|---|---|\n")
            out.write(f"| Auth/security tests | {auth_step_outcome} |\n")
            out.write(f"| Stress suite | {stress_step_outcome} |\n")
            out.write(f"| Baseline fetch step | {baseline_fetch_outcome} |\n")
            out.write(f"| Baseline fetch status | {baseline_fetch_status} |\n\n")

            out.write("## Auth and Security Tests\n\n")
            out.write(f"**Status: {auth_status}**\n\n")
            out.write(f"- report: `{auth_report_path}`\n")
            out.write(f"- total: `{auth_tests}`\n")
            out.write(f"- passed: `{auth_passed}`\n")
            out.write(f"- failed: `{auth_failures}`\n")
            out.write(f"- errors: `{auth_errors}`\n")
            out.write(f"- skipped: `{auth_skipped}`\n\n")

          if not report_paths:
            with open(summary_path, "a", encoding="utf-8") as out:
              out.write("## Reels Stress Suite\n\n")
              out.write("No report file found.\n")
              out.write(
                "- Tip: check `Run stress suite` step logs for fatal config parsing or runtime errors.\n"
              )
              out.write(
                "- Tip: if auth step failed first, summary still includes its outcome above.\n"
              )
            raise SystemExit(0)

          latest = report_paths[-1]
          previous = report_paths[-2] if len(report_paths) >= 2 else ""
          with open(latest, "r", encoding="utf-8") as f:
            report = json.load(f)

          previous_report = {}
          if previous:
            with open(previous, "r", encoding="utf-8") as f:
              previous_report = json.load(f)

          suite_pass = bool(report.get("suite_pass", False))
          status = "PASS" if suite_pass else "FAIL"
          config = report.get("config", {})
          action_stats = report.get("action_stats", {})
          threshold_failures = report.get("threshold_failures", [])

          with open(summary_path, "a", encoding="utf-8") as out:
            out.write("## Reels Stress Suite\n\n")
            out.write(f"**Status: {status}**\n\n")
            out.write("### Run Details\n")
            out.write(f"- preflight_mode: `{preflight_mode}`\n")
            out.write(f"- preflight_reason: `{preflight_reason}`\n")
            out.write(f"- report: `{latest}`\n")
            out.write(f"- reel_id: `{config.get('reel_id', '')}`\n")
            out.write(f"- rounds: `{config.get('rounds', '')}`\n")
            out.write(f"- workers: `{config.get('workers', '')}`\n")
            out.write(f"- token_count: `{report.get('token_count', 0)}`\n")
            out.write(f"- overall_from_stress_output: `{report.get('overall_from_stress_output', 'UNKNOWN')}`\n\n")

            out.write("### Action Scoreboard\n\n")
            out.write("| Action | Success % | Error % | Success | Errors | Total |\n")
            out.write("|---|---:|---:|---:|---:|---:|\n")
            for action in ["like", "share", "view", "follow"]:
              stats = action_stats.get(action, {})
              total = int(stats.get("total", 0))
              success = int(stats.get("success", 0))
              errors = int(stats.get("errors", 0))
              success_pct = stats.get("success_rate_bps", 0) / 100.0
              error_pct = stats.get("error_rate_bps", 0) / 100.0
              out.write(
                f"| {action} | {success_pct:.2f}% | {error_pct:.2f}% | {success} | {errors} | {total} |\n"
              )
            out.write("\n")

            out.write("### Threshold Failures\n")
            if threshold_failures:
              for failure in threshold_failures[:10]:
                out.write(f"- {failure}\n")
            else:
              out.write("- none\n")

            out.write("\n### Trend vs Previous\n")
            if not previous_report:
              out.write("- No previous report available in this run context.\n")
            else:
              out.write(f"- previous_report: `{previous}`\n")
              prev_action_stats = previous_report.get("action_stats", {})
              out.write("\n| Action | Success Δ (pp) | Error Δ (pp) |\n")
              out.write("|---|---:|---:|\n")
              for action in ["like", "share", "view", "follow"]:
                cur = action_stats.get(action, {})
                prev = prev_action_stats.get(action, {})
                cur_success = cur.get("success_rate_bps", 0) / 100.0
                prev_success = prev.get("success_rate_bps", 0) / 100.0
                cur_error = cur.get("error_rate_bps", 0) / 100.0
                prev_error = prev.get("error_rate_bps", 0) / 100.0
                delta_success = cur_success - prev_success
                delta_error = cur_error - prev_error
                out.write(
                  f"| {action} | {delta_success:+.2f} | {delta_error:+.2f} |\n"
                )
          PY
        env:
          AUTH_TESTS_OUTCOME: ${{ steps.auth_security_tests.outcome }}
          STRESS_SUITE_OUTCOME: ${{ steps.stress_suite.outcome }}
          BASELINE_FETCH_OUTCOME: ${{ steps.baseline_report.outcome }}
          BASELINE_FETCH_STATUS: ${{ steps.baseline_report.outputs.status }}
      - name: Fetch previous successful baseline report
        id: baseline_report
        if: always()
        run: |
          python - <<'PY'
          import io
          import json
          import os
          import zipfile
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          token = os.environ.get("GITHUB_TOKEN", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          workflow_file = os.environ.get("WORKFLOW_FILE", "reels-stress-suite.yml").strip()
          current_run_id = str(os.environ.get("GITHUB_RUN_ID", "")).strip()
          output_path = os.environ.get("GITHUB_OUTPUT", "").strip()
          target_path = Path("../test_reports/reels_stress_suite_previous_baseline.json")
          target_path.parent.mkdir(parents=True, exist_ok=True)

          def emit(status: str, message: str, baseline_path: str = "", baseline_run_id: str = ""):
            payload = {
              "event": "baseline_fetch",
              "status": status,
              "message": message,
              "baseline_path": baseline_path,
              "baseline_run_id": baseline_run_id,
            }
            print(json.dumps(payload, sort_keys=True))
            if output_path:
              with open(output_path, "a", encoding="utf-8") as out:
                out.write(f"status={status}\n")
                out.write(f"baseline_path={baseline_path}\n")
                out.write(f"baseline_run_id={baseline_run_id}\n")
                out.write(f"message<<EOF\n{message}\nEOF\n")

          if not token:
            emit("skipped", "GITHUB_TOKEN missing; cannot fetch baseline")
            raise SystemExit(0)

          if not repo or "/" not in repo:
            emit("skipped", "GITHUB_REPOSITORY missing or invalid")
            raise SystemExit(0)

          owner, name = repo.split("/", 1)
          api_base = f"https://api.github.com/repos/{owner}/{name}"
          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "User-Agent": "reels-stress-suite-baseline-fetcher",
          }

          def api_get_json(url: str):
            req = Request(url, headers=headers, method="GET")
            with urlopen(req, timeout=30) as resp:
              return json.loads(resp.read().decode("utf-8"))

          try:
            runs_url = (
              f"{api_base}/actions/workflows/{workflow_file}/runs"
              f"?status=completed&conclusion=success&per_page=20"
            )
            runs_payload = api_get_json(runs_url)
            workflow_runs = runs_payload.get("workflow_runs", []) or []

            candidate_run = None
            for run in workflow_runs:
              run_id = str(run.get("id", "")).strip()
              if run_id and run_id != current_run_id:
                candidate_run = run
                break

            if not candidate_run:
              emit("skipped", "No previous successful run found")
              raise SystemExit(0)

            baseline_run_id = str(candidate_run.get("id", "")).strip()
            artifacts_url = f"{api_base}/actions/runs/{baseline_run_id}/artifacts?per_page=100"
            artifacts_payload = api_get_json(artifacts_url)
            artifacts = artifacts_payload.get("artifacts", []) or []

            chosen = None
            for artifact in artifacts:
              artifact_name = str(artifact.get("name", ""))
              if artifact_name.startswith("reels-stress-reports-") and not artifact.get("expired", False):
                chosen = artifact
                break

            if not chosen:
              emit("skipped", f"No usable stress artifact found in run {baseline_run_id}", baseline_run_id=baseline_run_id)
              raise SystemExit(0)

            archive_url = str(chosen.get("archive_download_url", "")).strip()
            if not archive_url:
              emit("skipped", "Artifact download URL missing", baseline_run_id=baseline_run_id)
              raise SystemExit(0)

            archive_req = Request(archive_url, headers=headers, method="GET")
            with urlopen(archive_req, timeout=60) as resp:
              zip_bytes = resp.read()

            with zipfile.ZipFile(io.BytesIO(zip_bytes), "r") as zf:
              members = [n for n in zf.namelist() if n.endswith(".json") and "reels_stress_suite_" in n]
              if not members:
                emit("skipped", "No stress JSON found inside baseline artifact", baseline_run_id=baseline_run_id)
                raise SystemExit(0)

              selected_member = sorted(members)[-1]
              with zf.open(selected_member, "r") as src:
                payload = json.loads(src.read().decode("utf-8"))

            with open(target_path, "w", encoding="utf-8") as out:
              json.dump(payload, out, indent=2, ensure_ascii=False)

            emit(
              "available",
              f"Baseline report fetched from run {baseline_run_id}",
              baseline_path=str(target_path),
              baseline_run_id=baseline_run_id,
            )

          except (HTTPError, URLError) as exc:
            emit("skipped", f"GitHub API error while fetching baseline: {exc}")
          except Exception as exc:
            emit("skipped", f"Unexpected baseline fetch error: {exc}")
          PY
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: reels-stress-suite.yml

      - name: Collect stress report candidates
        id: report_candidates
        if: always()
        run: |
          python - <<'PY'
          import glob
          import json
          import os

          reports = sorted(glob.glob("../test_reports/reels_stress_suite_*.json"))
          latest = reports[-1] if reports else ""
          baseline = os.environ.get("BASELINE_REPORT_PATH", "").strip()
          previous = reports[-2] if len(reports) >= 2 else baseline
          previous_source = "same_run" if len(reports) >= 2 else ("baseline" if baseline else "none")

          payload = {
            "event": "report_candidates",
            "count": len(reports),
            "latest": latest,
            "previous": previous,
            "previous_source": previous_source,
          }
          print(json.dumps(payload, sort_keys=True))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"report_count={len(reports)}\n")
            out.write(f"latest_report={latest}\n")
            out.write(f"previous_report={previous}\n")
            out.write(f"previous_source={previous_source}\n")
          PY
        env:
          BASELINE_REPORT_PATH: ${{ steps.baseline_report.outputs.baseline_path }}

      - name: Validate regression gate inputs
        id: validate_regression_inputs
        if: always()
        run: |
          python - <<'PY'
          import json
          import os

          errors = []
          latest = os.environ.get("LATEST_REPORT", "").strip()
          if latest == "":
            errors.append("Latest stress report path is empty")

          for name in ["REGRESSION_MAX_SUCCESS_DROP_PP", "REGRESSION_MAX_ERROR_INCREASE_PP"]:
            raw = os.environ.get(name, "")
            if str(raw).strip() == "":
              errors.append(f"{name} is empty")

          payload = {
            "event": "validate_regression_inputs",
            "errors": errors,
            "latest_report": latest,
            "previous_report": os.environ.get("PREVIOUS_REPORT", ""),
            "max_success_drop_pp": os.environ.get("REGRESSION_MAX_SUCCESS_DROP_PP", ""),
            "max_error_increase_pp": os.environ.get("REGRESSION_MAX_ERROR_INCREASE_PP", ""),
          }
          print(json.dumps(payload, sort_keys=True))

          status = "ok" if not errors else "error"
          message = "All required regression inputs are present" if not errors else "; ".join(errors)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"validation_status={status}\n")
            out.write(f"validation_message<<EOF\n{message}\nEOF\n")

          if errors:
            print(f"::error::{message}")
          PY
        env:
          LATEST_REPORT: ${{ steps.report_candidates.outputs.latest_report }}
          PREVIOUS_REPORT: ${{ steps.report_candidates.outputs.previous_report }}

      # Dedicated, reusable Python gate with structured logs and safe parsing.
      - name: Enforce regression gate
        id: regression_gate
        if: always()
        run: |
          python ci_regression_gate.py \
            --current-report "${{ steps.report_candidates.outputs.latest_report }}" \
            --previous-report "${{ steps.report_candidates.outputs.previous_report }}" \
            --max-success-drop-pp "${{ env.REGRESSION_MAX_SUCCESS_DROP_PP }}" \
            --max-error-increase-pp "${{ env.REGRESSION_MAX_ERROR_INCREASE_PP }}" \
            --actions "like,share,view,follow" \
            --on-missing "error" \
            --default-metric-bps "0"

      - name: Fail on regression violations
        if: steps.regression_gate.outputs.gate_status == 'failed'
        run: |
          echo "Regression gate failed: ${{ steps.regression_gate.outputs.gate_message }}"
          exit 1

      - name: Fail on auth/security test violations
        if: steps.auth_security_tests.outcome == 'failure'
        run: |
          echo "Auth/security regression tests failed. See pytest_auth_security.xml and test logs."
          exit 1

      - name: Upload stress reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reels-stress-reports-${{ github.run_id }}
          path: |
            test_reports/reels_stress_suite_*.json
            test_reports/pytest_auth_security.xml
          if-no-files-found: warn

      - name: Build webhook summary
        if: always() && env.WEBHOOK_URL != ''
        id: summary
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          cmd = [
            "python",
            "ci_gate_context.py",
            "--report-glob",
            "../test_reports/reels_stress_suite_*.json",
            "--regression-status",
            os.environ.get("REGRESSION_STATUS", "unknown"),
            "--regression-message",
            os.environ.get("REGRESSION_MESSAGE", ""),
            "--webhook-enabled",
            "false",
            "--webhook-outcome",
            "skipped",
          ]
          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          ctx = json.loads(result.stdout)

          release_decision = ctx.get("release_decision", "manual-review")
          gate_severity = ctx.get("gate_severity", "warning")
          status = ctx.get("status", "FAIL")
          token_count = ctx.get("token_count", 0)
          overall = ctx.get("overall", "UNKNOWN")
          reel_id = ctx.get("reel_id", os.environ.get("REEL_ID", ""))
          workers = ctx.get("workers", os.environ.get("WORKERS", ""))
          rounds = ctx.get("rounds", os.environ.get("ROUNDS", ""))
          threshold_status = ctx.get("threshold_status", "unknown")
          regression_status = ctx.get("regression_status", "unknown")
          total_count = int(ctx.get("gate_score", {}).get("total", 0))
          top_failures_line = ctx.get("top_failures_line", "none")
          failures_text = ctx.get("failures_text", "none")
          action_line = ctx.get("action_line", "action stats unavailable")
          severity = "good" if release_decision == "allow" else "danger"

          message = (
              f"[Reels Stress Suite] decision={release_decision} severity={gate_severity} status={status} "
              f"| run={os.environ.get('GITHUB_RUN_ID')} "
              f"| reel_id={reel_id} | workers={workers} | rounds={rounds} "
            f"| token_count={token_count} | overall={overall}"
          )
          details = (
            f"Gate summary: threshold={threshold_status}, regression={regression_status}, active={total_count}\n"
            f"Top failures: {top_failures_line}\n"
            f"Threshold failures: {failures_text}\n"
            f"Action summary: {action_line}"
          )

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"message<<EOF\n{message}\nEOF\n")
              out.write(f"details<<EOF\n{details}\nEOF\n")
              out.write(f"severity={severity}\n")
          PY

      - name: Send webhook notification
        id: webhook_notify
        if: always() && env.WEBHOOK_URL != ''
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          message = os.environ.get("SUMMARY_MESSAGE", "Reels stress suite completed")
          details = os.environ.get("SUMMARY_DETAILS", "")
          severity = os.environ.get("SUMMARY_SEVERITY", "danger")
          webhook_url = os.environ.get("WEBHOOK_URL", "")
          retry_attempts = int(os.environ.get("WEBHOOK_RETRY_ATTEMPTS", "3"))
          retry_backoff_seconds = float(os.environ.get("WEBHOOK_RETRY_BACKOFF_SECONDS", "1.5"))
          fail_on_error = os.environ.get("WEBHOOK_FAIL_ON_ERROR", "0") == "1"

          is_discord = "discord.com/api/webhooks" in webhook_url
          is_slack = "hooks.slack.com/services" in webhook_url

          if is_discord:
            payload = {
              "content": f"{message}\n{details}".strip()
            }
          elif is_slack:
            color = "#2eb886" if severity == "good" else "#a30200"
            payload = {
              "text": message,
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": f"*{message}*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": details or "No additional details"
                  }
                }
              ],
              "attachments": [
                {
                  "color": color,
                  "text": "Reels stress suite summary"
                }
              ]
            }
          else:
            payload = {
              "text": message,
              "content": f"{message}\n{details}".strip()
            }

          data = json.dumps(payload, ensure_ascii=True).encode("utf-8")
          last_error = None
          for attempt in range(1, max(1, retry_attempts) + 1):
            try:
              req = urllib.request.Request(
                webhook_url,
                data=data,
                headers={"Content-Type": "application/json"},
                method="POST",
              )
              with urllib.request.urlopen(req, timeout=20) as resp:
                _ = resp.read()
              print(f"Webhook delivered on attempt {attempt}")
              last_error = None
              break
            except (urllib.error.URLError, urllib.error.HTTPError, TimeoutError) as err:
              last_error = err
              print(f"Webhook attempt {attempt} failed: {err}")
              if attempt < max(1, retry_attempts):
                sleep_seconds = retry_backoff_seconds * (2 ** (attempt - 1))
                time.sleep(sleep_seconds)

          if last_error is not None:
            msg = f"Webhook delivery failed after {max(1, retry_attempts)} attempts: {last_error}"
            if fail_on_error:
              raise RuntimeError(msg)
            print(msg)
          PY
        env:
          REGRESSION_STATUS: ${{ steps.regression_gate.outputs.gate_status }}
          REGRESSION_MESSAGE: ${{ steps.regression_gate.outputs.gate_message }}
          SUMMARY_MESSAGE: ${{ steps.summary.outputs.message }}
          SUMMARY_DETAILS: ${{ steps.summary.outputs.details }}
          SUMMARY_SEVERITY: ${{ steps.summary.outputs.severity }}
          WEBHOOK_RETRY_ATTEMPTS: ${{ vars.REELS_WEBHOOK_RETRY_ATTEMPTS }}
          WEBHOOK_RETRY_BACKOFF_SECONDS: ${{ vars.REELS_WEBHOOK_RETRY_BACKOFF_SECONDS }}
          WEBHOOK_FAIL_ON_ERROR: ${{ vars.REELS_WEBHOOK_FAIL_ON_ERROR }}

      - name: Append gates at a glance
        id: gate_summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary_path:
            raise SystemExit(0)

          cmd = [
            "python",
            "ci_gate_context.py",
            "--report-glob",
            "../test_reports/reels_stress_suite_*.json",
            "--regression-status",
            os.environ.get("REGRESSION_STATUS", "unknown"),
            "--regression-message",
            os.environ.get("REGRESSION_MESSAGE", ""),
            "--webhook-enabled",
            os.environ.get("WEBHOOK_ENABLED", "false"),
            "--webhook-outcome",
            os.environ.get("WEBHOOK_OUTCOME", "skipped"),
            "--include-webhook-in-policy",
          ]
          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          ctx = json.loads(result.stdout)

          threshold_status = ctx.get("threshold_status", "unknown")
          regression_status = ctx.get("regression_status", "unknown")
          regression_message = ctx.get("regression_message", "")
          webhook_status = ctx.get("webhook_status", "unknown")
          webhook_outcome = ctx.get("webhook_outcome", "skipped")
          passed_count = int(ctx.get("gate_score", {}).get("passed", 0))
          total_count = int(ctx.get("gate_score", {}).get("total", 0))
          gate_severity = ctx.get("gate_severity", "warning")
          release_decision = ctx.get("release_decision", "manual-review")
          recommendation = ctx.get("recommendation", "No immediate action required.")

          with open(summary_path, "a", encoding="utf-8") as out:
            out.write("\n### Gates At A Glance\n\n")
            out.write("| Gate | Status | Detail |\n")
            out.write("|---|---|---|\n")
            out.write(f"| Threshold gate | {threshold_status} | Based on suite_pass in latest report |\n")
            out.write(f"| Regression gate | {regression_status} | {regression_message or 'n/a'} |\n")
            out.write(f"| Webhook delivery | {webhook_status} | outcome={webhook_outcome} |\n")
            out.write("\n")
            out.write(f"- gate_score: {passed_count}/{total_count} active gates passed\n")
            out.write(f"- gate_severity: {gate_severity}\n")
            out.write(f"- release_decision: {release_decision}\n")
            out.write(f"- recommended_action: {recommendation}\n")

          output_path = os.environ.get("GITHUB_OUTPUT", "")
          if output_path:
            with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"gate_severity={gate_severity}\n")
              out.write(f"release_decision={release_decision}\n")
              out.write(f"recommended_action<<EOF\n{recommendation}\nEOF\n")
          PY
        env:
          REGRESSION_STATUS: ${{ steps.regression_gate.outputs.gate_status }}
          REGRESSION_MESSAGE: ${{ steps.regression_gate.outputs.gate_message }}
          WEBHOOK_OUTCOME: ${{ steps.webhook_notify.outcome }}
          WEBHOOK_ENABLED: ${{ env.WEBHOOK_URL != '' && 'true' || 'false' }}

      - name: Enforce release policy
        if: always()
        run: |
          ENFORCE="${{ vars.REELS_ENFORCE_RELEASE_POLICY }}"
          if [ -z "$ENFORCE" ]; then ENFORCE="1"; fi

          DECISION="${{ steps.gate_summary.outputs.release_decision }}"
          SEVERITY="${{ steps.gate_summary.outputs.gate_severity }}"
          ACTION="${{ steps.gate_summary.outputs.recommended_action }}"

          echo "release_decision=$DECISION"
          echo "gate_severity=$SEVERITY"

          if [ "$ENFORCE" != "1" ]; then
            echo "Release policy enforcement disabled via REELS_ENFORCE_RELEASE_POLICY=$ENFORCE"
            exit 0
          fi

          if [ "$DECISION" = "block" ]; then
            echo "::error::Release blocked by policy. severity=$SEVERITY action=$ACTION"
            exit 1
          fi

          if [ "$DECISION" = "manual-review" ]; then
            echo "::warning::Manual review required by policy. severity=$SEVERITY action=$ACTION"
            exit 0
          fi

          echo "Release policy passed."
