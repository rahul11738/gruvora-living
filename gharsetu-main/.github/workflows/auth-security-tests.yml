name: Auth Security Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/auth-security-tests.yml
      - .github/workflows/reels-stress-suite.yml
  push:
    branches:
      - main
      - develop
    paths:
      - backend/**
      - .github/workflows/auth-security-tests.yml
      - .github/workflows/reels-stress-suite.yml

permissions:
  contents: read

jobs:
  auth-security:
    name: Run Auth/Security Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    concurrency:
      group: auth-security-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight config
        id: preflight
        shell: bash
        run: |
          if [ -z "${{ secrets.REELS_BASE_URL }}" ] || [ -z "${{ secrets.JWT_SECRET }}" ]; then
            if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
              echo "run_tests=false" >> "$GITHUB_OUTPUT"
              echo "preflight_mode=skipped-on-pr" >> "$GITHUB_OUTPUT"
              echo "preflight_reason=missing REELS_BASE_URL or JWT_SECRET" >> "$GITHUB_OUTPUT"
              echo "::notice::Skipping auth/security tests for pull_request because REELS_BASE_URL or JWT_SECRET is not configured."
            else
              echo "run_tests=false" >> "$GITHUB_OUTPUT"
              echo "preflight_mode=enforced-missing-secrets" >> "$GITHUB_OUTPUT"
              echo "preflight_reason=missing REELS_BASE_URL or JWT_SECRET" >> "$GITHUB_OUTPUT"
              echo "::error::Missing required secrets REELS_BASE_URL and/or JWT_SECRET."
              exit 1
            fi
          else
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "preflight_mode=enforced" >> "$GITHUB_OUTPUT"
            echo "preflight_reason=configured" >> "$GITHUB_OUTPUT"
          fi

      - name: Run auth/security tests
        if: steps.preflight.outputs.run_tests == 'true'
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REELS_BASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: python -m pytest tests/test_auth_security.py -q --junitxml=../test_reports/pytest_auth_security.xml

      - name: Publish auth/security summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if not summary_path:
            raise RuntimeError("GITHUB_STEP_SUMMARY is not available")

          run_tests = os.environ.get("RUN_TESTS", "false") == "true"
          preflight_mode = os.environ.get("PREFLIGHT_MODE", "unknown")
          preflight_reason = os.environ.get("PREFLIGHT_REASON", "not provided")
          report_path = "../test_reports/pytest_auth_security.xml"

          with open(summary_path, "a", encoding="utf-8") as out:
            out.write("## Auth and Security Tests\n\n")
            out.write(f"- preflight_mode: `{preflight_mode}`\n")
            out.write(f"- preflight_reason: `{preflight_reason}`\n")
            if not run_tests:
              out.write("- status: `SKIPPED`\n")
              out.write("- status_reason: `Tests were not executed in this run mode`\n\n")
              raise SystemExit(0)

            if not os.path.exists(report_path):
              out.write("- status: `UNKNOWN`\n")
              out.write("- reason: `JUnit report not found`\n\n")
              raise SystemExit(0)

            root = ET.parse(report_path).getroot()
            if root.tag == "testsuite":
              suite = root
            else:
              suite = root.find("testsuite")

            tests = int(suite.attrib.get("tests", 0)) if suite is not None else 0
            failures = int(suite.attrib.get("failures", 0)) if suite is not None else 0
            errors = int(suite.attrib.get("errors", 0)) if suite is not None else 0
            skipped = int(suite.attrib.get("skipped", 0)) if suite is not None else 0
            passed = max(tests - failures - errors - skipped, 0)
            status = "PASS" if (failures + errors) == 0 else "FAIL"

            out.write(f"- status: `{status}`\n")
            out.write(f"- report: `{report_path}`\n")
            out.write(f"- total: `{tests}`\n")
            out.write(f"- passed: `{passed}`\n")
            out.write(f"- failed: `{failures}`\n")
            out.write(f"- errors: `{errors}`\n")
            out.write(f"- skipped: `{skipped}`\n\n")
          PY
        env:
          RUN_TESTS: ${{ steps.preflight.outputs.run_tests }}
          PREFLIGHT_MODE: ${{ steps.preflight.outputs.preflight_mode }}
          PREFLIGHT_REASON: ${{ steps.preflight.outputs.preflight_reason }}

      - name: Upload auth/security test report
        if: always() && steps.preflight.outputs.run_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: auth-security-tests-${{ github.run_id }}
          path: test_reports/pytest_auth_security.xml
          if-no-files-found: warn
