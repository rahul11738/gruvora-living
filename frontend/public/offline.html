<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Gruvora Living - Offline</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(16, 185, 129, 0.14), transparent 28%),
                linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            color: #0f172a;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 460px);
            padding: 32px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .logo {
            width: 88px;
            height: 88px;
            display: inline-grid;
            place-items: center;
            margin-bottom: 20px;
            border-radius: 24px;
            background: linear-gradient(145deg, #000000, #111827);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
        }

        .logo svg {
            width: 54px;
            height: 54px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.7rem, 3vw, 2.2rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: #475569;
            line-height: 1.6;
        }

        .hint {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.04);
            color: #334155;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <main class="card" role="main" aria-labelledby="offline-title">
        <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="0" y="0" width="512" height="512" rx="120" fill="#000000" />
                <path
                    d="M166 145C166 129.536 178.536 117 194 117H323C338.464 117 351 129.536 351 145V367C351 382.464 338.464 395 323 395H194C178.536 395 166 382.464 166 367V145Z"
                    stroke="#F8FAFC" stroke-width="18" />
                <path d="M210 196L210 316L316 256L210 196Z" fill="#10B981" />
                <circle cx="282" cy="176" r="14" fill="#F8FAFC" />
            </svg>
        </div>
        <h1 id="offline-title">You are offline</h1>
        <p>The Gruvora Living app shell is available, but the current request needs a network connection or a cached
            page.</p>
        <div class="hint">Reconnect and refresh to resume reels, profiles, and admin actions.</div>
    </main>
</body>

</html>
